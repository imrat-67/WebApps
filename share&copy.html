<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyClip — Personal Clipboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0f11;
      --surface:   #18191d;
      --surface2:  #22242a;
      --border:    #2e3039;
      --accent:    #f0c040;
      --accent2:   #e07b30;
      --text:      #edeef2;
      --text-muted:#888ba0;
      --danger:    #e05555;
      --radius:    14px;
      --font-mono: 'JetBrains Mono', monospace;
      --font-main: 'Syne', sans-serif;
      --composer-h: 90px;
      --header-h:   58px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-main); overflow: hidden; }
    .hidden { display: none !important; }

    /* LOCK SCREEN */
    #lockScreen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      background-image: radial-gradient(ellipse 60% 50% at 50% 0%, #f0c04018 0%, transparent 70%);
      z-index: 1000;
      animation: fadeIn .4s ease;
    }
    .lock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 40px 36px;
      width: 360px;
      text-align: center;
      box-shadow: 0 40px 80px #00000088;
    }
    .lock-icon { font-size: 44px; margin-bottom: 12px; }
    .lock-title { font-size: 2rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
    .lock-sub { font-size: .85rem; color: var(--text-muted); margin: 6px 0 28px; font-family: var(--font-mono); }
    .lock-input-wrap { display: flex; gap: 8px; }
    .lock-input-wrap input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; color: var(--text);
      font-family: var(--font-mono); font-size: .9rem; outline: none; transition: border-color .2s;
    }
    .lock-input-wrap input:focus { border-color: var(--accent); }
    .lock-input-wrap button {
      background: var(--accent); color: #0e0f11; border: none; border-radius: 10px;
      padding: 12px 20px; font-family: var(--font-main); font-weight: 700; font-size: .9rem;
      cursor: pointer; transition: opacity .2s, transform .1s;
    }
    .lock-input-wrap button:hover { opacity: .88; }
    .lock-input-wrap button:active { transform: scale(.97); }
    .lock-error { color: var(--danger); font-size: .8rem; font-family: var(--font-mono); margin-top: 12px; min-height: 18px; }

    /* HEADER */
    header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h); background: var(--surface);
      border-bottom: 1px solid var(--border); z-index: 100;
    }
    .header-inner {
      max-width: 720px; margin: 0 auto; height: 100%;
      display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 1.4rem; }
    .logo-text { font-size: 1.3rem; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .item-count {
      font-family: var(--font-mono); font-size: .75rem; color: var(--text-muted);
      background: var(--surface2); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px;
    }
    .lock-app-btn {
      background: transparent; border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 10px; font-size: 1rem; cursor: pointer; transition: background .2s, border-color .2s;
    }
    .lock-app-btn:hover { background: var(--surface2); border-color: var(--accent); }

    /* FEED */
    main {
      position: fixed; top: var(--header-h); left: 0; right: 0;
      bottom: 110px; overflow-y: auto; padding: 20px 20px 10px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    main::-webkit-scrollbar { width: 5px; }
    main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    .feed-inner {
      max-width: 720px; width: 100%; margin: 0 auto;
      display: flex; flex-direction: column-reverse; gap: 12px;
    }
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; height: 100%; color: var(--text-muted); font-family: var(--font-mono); font-size: .85rem;
    }
    .empty-icon { font-size: 3rem; }

    /* CLIP CARD */
    .clip-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      animation: slideIn .25s cubic-bezier(.4,0,.2,1); transition: border-color .2s;
    }
    .clip-card:hover { border-color: #44465a; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .clip-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .clip-time { font-family: var(--font-mono); font-size: .7rem; color: var(--text-muted); }
    .clip-type-badge {
      font-family: var(--font-mono); font-size: .65rem; padding: 2px 8px;
      border-radius: 20px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
    }
    .text-badge { background: #f0c04015; color: var(--accent); border: 1px solid #f0c04030; }
    .img-badge  { background: #e07b3015; color: var(--accent2); border: 1px solid #e07b3030; }
    .clip-content {
      font-family: var(--font-mono); font-size: .85rem; line-height: 1.6; color: var(--text);
      word-break: break-word; white-space: pre-wrap; max-height: 200px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .clip-image {
      max-width: 100%; border-radius: 8px; display: block;
      max-height: 300px; object-fit: contain; cursor: zoom-in;
    }
    .clip-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
    .btn-copy, .btn-delete {
      display: flex; align-items: center; gap: 6px; padding: 7px 14px;
      border-radius: 8px; border: 1px solid var(--border);
      font-family: var(--font-mono); font-size: .75rem; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .btn-copy { background: #f0c04012; color: var(--accent); border-color: #f0c04030; }
    .btn-copy:hover { background: #f0c04022; border-color: var(--accent); }
    .btn-copy.copied { background: #22c55e20; color: #22c55e; border-color: #22c55e40; }
    .btn-delete { background: transparent; color: var(--text-muted); }
    .btn-delete:hover { background: #e0555520; color: var(--danger); border-color: #e0555540; }

    /* COMPOSER */
    .composer-wrap {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 20px 16px;
      background: linear-gradient(transparent, var(--bg) 30%);
    }
    .composer {
      max-width: 720px; margin: 0 auto; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; transition: border-color .2s; box-shadow: 0 8px 32px #00000060;
    }
    .composer:focus-within { border-color: #44465a; }
    .image-preview-area { position: relative; padding: 12px 12px 0; display: flex; align-items: flex-start; }
    .image-preview-area img { max-height: 120px; max-width: 200px; border-radius: 8px; object-fit: contain; border: 1px solid var(--border); }
    .clear-img-btn {
      position: absolute; top: 8px; left: 140px; background: var(--danger);
      color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px;
      font-size: .7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700;
    }
    .composer-row { display: flex; align-items: flex-end; gap: 8px; padding: 10px 12px; }
    #textInput {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: var(--font-mono); font-size: .85rem;
      resize: none; line-height: 1.6; max-height: 120px; overflow-y: auto;
    }
    #textInput::placeholder { color: var(--text-muted); }
    .composer-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .img-upload-btn {
      font-size: 1.2rem; cursor: pointer; padding: 6px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface2);
      display: flex; align-items: center; justify-content: center; transition: border-color .2s; user-select: none;
    }
    .img-upload-btn:hover { border-color: var(--accent2); }
    .send-btn {
      display: flex; align-items: center; gap: 7px; background: var(--accent);
      color: #0e0f11; border: none; border-radius: 10px; padding: 9px 16px;
      font-family: var(--font-main); font-weight: 700; font-size: .85rem;
      cursor: pointer; transition: opacity .2s, transform .1s;
    }
    .send-btn:hover { opacity: .88; }
    .send-btn:active { transform: scale(.97); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 120px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: var(--font-mono); font-size: .8rem;
      padding: 10px 20px; border-radius: 30px; opacity: 0;
      pointer-events: none; transition: opacity .25s, transform .25s;
      white-space: nowrap; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* LOADING */
    .loading-dots { display: flex; gap: 6px; align-items: center; justify-content: center; padding: 40px; }
    .loading-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted); animation: bounce .8s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: .15s; }
    .loading-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* LIGHTBOX */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: #000000cc; z-index: 2000;
      align-items: center; justify-content: center; cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 10px; }

    @media (max-width: 480px) {
      .lock-card { width: 90vw; padding: 36px 24px 28px; }
      .send-btn span { display: none; }
    }
  </style>
</head>
<body>

  <!-- LOCK SCREEN -->
  <div id="lockScreen">
    <div class="lock-card">
      <div class="lock-icon">🔐</div>
      <h1 class="lock-title">MyClip</h1>
      <p class="lock-sub">Your personal clipboard vault</p>
      <div class="lock-input-wrap">
        <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off" />
        <button id="unlockBtn">Unlock</button>
      </div>
      <p id="lockError" class="lock-error"></p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="hidden">
    <header>
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">📋</span>
          <span class="logo-text">MyClip</span>
        </div>
        <div class="header-right">
          <span id="itemCount" class="item-count">0 clips</span>
          <button id="lockBtn" class="lock-app-btn" title="Lock">🔒</button>
        </div>
      </div>
    </header>

    <main id="clipFeed">
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">📭</div>
        <p>No clips yet. Start saving something!</p>
      </div>
    </main>

    <div class="composer-wrap">
      <div class="composer">
        <div id="imagePreviewArea" class="image-preview-area hidden">
          <img id="imagePreview" src="" alt="preview" />
          <button id="clearImage" class="clear-img-btn">✕</button>
        </div>
        <div class="composer-row">
          <textarea id="textInput" placeholder="Type, paste text or upload an image… (Ctrl+Enter to save)" rows="1"></textarea>
          <div class="composer-actions">
            <label class="img-upload-btn" title="Upload image">
              🖼
              <input type="file" id="imageInput" accept="image/*" hidden />
            </label>
            <button id="sendBtn" class="send-btn">
              <span>Save</span>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox"><img id="lightboxImg" src="" alt="full size" /></div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <!-- Firebase (ESM via CDN) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore, collection, addDoc, deleteDoc,
      doc, onSnapshot, query, orderBy, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ── Firebase Config ──────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyCSplkuLtdM8vWe5OG2_cHsGHXCrIge80g",
      authDomain: "webapps-58ca2.firebaseapp.com",
      projectId: "webapps-58ca2",
      storageBucket: "webapps-58ca2.firebasestorage.app",
      messagingSenderId: "513100660929",
      appId: "1:513100660929:web:a934daf4211e9bd6ab9440"
    };
    const fbApp = initializeApp(firebaseConfig);
    const db = getFirestore(fbApp);
    const clipsCol = collection(db, "clips");

    // ── Password ─────────────────────────────────────
    // ✏️ Change this to your own password:
    const APP_PASSWORD = "myclip2024";
    const SESSION_KEY  = "myclip_unlocked";

    // ── DOM ──────────────────────────────────────────
    const lockScreen       = document.getElementById("lockScreen");
    const appEl            = document.getElementById("app");
    const passwordInput    = document.getElementById("passwordInput");
    const unlockBtn        = document.getElementById("unlockBtn");
    const lockError        = document.getElementById("lockError");
    const lockBtn          = document.getElementById("lockBtn");
    const clipFeed         = document.getElementById("clipFeed");
    const emptyState       = document.getElementById("emptyState");
    const textInput        = document.getElementById("textInput");
    const imageInput       = document.getElementById("imageInput");
    const imagePreview     = document.getElementById("imagePreview");
    const imagePreviewArea = document.getElementById("imagePreviewArea");
    const clearImageBtn    = document.getElementById("clearImage");
    const sendBtn          = document.getElementById("sendBtn");
    const itemCount        = document.getElementById("itemCount");
    const toast            = document.getElementById("toast");
    const lightbox         = document.getElementById("lightbox");
    const lightboxImg      = document.getElementById("lightboxImg");

    let selectedImageBase64 = null;
    let unsubscribe = null;

    // ── Lock / Unlock ────────────────────────────────
    function unlock() {
      sessionStorage.setItem(SESSION_KEY, "true");
      lockScreen.style.display = "none";
      appEl.classList.remove("hidden");
      startListening();
    }
    function lock() {
      sessionStorage.removeItem(SESSION_KEY);
      if (unsubscribe) unsubscribe();
      appEl.classList.add("hidden");
      lockScreen.style.display = "flex";
      passwordInput.value = "";
      lockError.textContent = "";
    }
    function handleUnlock() {
      if (passwordInput.value.trim() === APP_PASSWORD) {
        unlock();
      } else {
        lockError.textContent = "Wrong password. Try again.";
        passwordInput.value = "";
        passwordInput.focus();
      }
    }
    unlockBtn.addEventListener("click", handleUnlock);
    passwordInput.addEventListener("keydown", e => {
      if (e.key === "Enter") handleUnlock();
      lockError.textContent = "";
    });
    lockBtn.addEventListener("click", lock);

    if (sessionStorage.getItem(SESSION_KEY) === "true") unlock();

    // ── Textarea auto-resize ─────────────────────────
    textInput.addEventListener("input", () => {
      textInput.style.height = "auto";
      textInput.style.height = Math.min(textInput.scrollHeight, 120) + "px";
    });
    textInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) { e.preventDefault(); handleSend(); }
    });

    // ── Image select ─────────────────────────────────
    imageInput.addEventListener("change", e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        selectedImageBase64 = ev.target.result;
        imagePreview.src = selectedImageBase64;
        imagePreviewArea.classList.remove("hidden");
      };
      reader.readAsDataURL(file);
      imageInput.value = "";
    });
    clearImageBtn.addEventListener("click", () => {
      selectedImageBase64 = null;
      imagePreview.src = "";
      imagePreviewArea.classList.add("hidden");
    });

    // ── Paste image from clipboard ───────────────────
    document.addEventListener("paste", e => {
      if (sessionStorage.getItem(SESSION_KEY) !== "true") return;
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith("image/")) {
          const reader = new FileReader();
          reader.onload = ev => {
            selectedImageBase64 = ev.target.result;
            imagePreview.src = selectedImageBase64;
            imagePreviewArea.classList.remove("hidden");
          };
          reader.readAsDataURL(item.getAsFile());
          break;
        }
      }
    });

    // ── Send ─────────────────────────────────────────
    sendBtn.addEventListener("click", handleSend);
    async function handleSend() {
      const text = textInput.value.trim();
      if (!text && !selectedImageBase64) return;
      sendBtn.disabled = true;
      const sp = sendBtn.querySelector("span");
      if (sp) sp.textContent = "Saving…";
      try {
        await addDoc(clipsCol, {
          type: selectedImageBase64 ? (text ? "both" : "image") : "text",
          text: text || null,
          image: selectedImageBase64 || null,
          createdAt: serverTimestamp()
        });
        textInput.value = "";
        textInput.style.height = "auto";
        selectedImageBase64 = null;
        imagePreview.src = "";
        imagePreviewArea.classList.add("hidden");
        showToast("✅ Clip saved!");
      } catch (err) {
        showToast("❌ Error: " + err.message);
      } finally {
        sendBtn.disabled = false;
        if (sp) sp.textContent = "Save";
      }
    }

    // ── Firestore listener ───────────────────────────
    function startListening() {
      clipFeed.innerHTML = `<div class="feed-inner"><div class="loading-dots"><span></span><span></span><span></span></div></div>`;
      const q = query(clipsCol, orderBy("createdAt", "desc"));
      unsubscribe = onSnapshot(q, snap => {
        const clips = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderClips(clips);
      }, err => showToast("❌ " + err.message));
    }

    // ── Render ───────────────────────────────────────
    function renderClips(clips) {
      itemCount.textContent = clips.length === 0 ? "0 clips" : `${clips.length} clip${clips.length !== 1 ? "s" : ""}`;
      clipFeed.innerHTML = "";
      if (clips.length === 0) {
        emptyState.style.display = "flex";
        clipFeed.appendChild(emptyState);
        return;
      }
      emptyState.style.display = "none";
      const inner = document.createElement("div");
      inner.className = "feed-inner";
      clips.forEach(clip => inner.appendChild(buildCard(clip)));
      clipFeed.appendChild(inner);
    }

    function buildCard(clip) {
      const card = document.createElement("div");
      card.className = "clip-card";

      // Meta
      const meta = document.createElement("div");
      meta.className = "clip-meta";
      const time = document.createElement("span");
      time.className = "clip-time";
      time.textContent = clip.createdAt ? formatDate(clip.createdAt.toDate()) : "Just now";
      const badge = document.createElement("span");
      badge.className = "clip-type-badge " + (clip.type === "text" ? "text-badge" : "img-badge");
      badge.textContent = clip.type === "text" ? "TEXT" : "IMAGE";
      meta.appendChild(time);
      meta.appendChild(badge);
      card.appendChild(meta);

      // Image
      if (clip.image) {
        const img = document.createElement("img");
        img.className = "clip-image";
        img.src = clip.image;
        img.alt = "Saved image";
        img.title = "Click to enlarge";
        img.addEventListener("click", () => { lightboxImg.src = clip.image; lightbox.classList.add("open"); });
        card.appendChild(img);
      }

      // Text
      if (clip.text) {
        const content = document.createElement("div");
        content.className = "clip-content";
        content.textContent = clip.text;
        card.appendChild(content);
      }

      // Actions
      const actions = document.createElement("div");
      actions.className = "clip-actions";

      const copyBtn = document.createElement("button");
      copyBtn.className = "btn-copy";
      copyBtn.innerHTML = `<span>📋</span><span>Copy</span>`;
      copyBtn.addEventListener("click", () => handleCopy(clip, copyBtn));

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "btn-delete";
      deleteBtn.innerHTML = `<span>🗑</span><span>Delete</span>`;
      deleteBtn.addEventListener("click", async () => {
        card.style.opacity = "0.4";
        card.style.pointerEvents = "none";
        try {
          await deleteDoc(doc(db, "clips", clip.id));
          showToast("🗑 Deleted.");
        } catch {
          card.style.opacity = "1";
          card.style.pointerEvents = "auto";
          showToast("❌ Delete failed.");
        }
      });

      actions.appendChild(copyBtn);
      actions.appendChild(deleteBtn);
      card.appendChild(actions);
      return card;
    }

    // ── Copy ─────────────────────────────────────────
    async function handleCopy(clip, btn) {
      try {
        if (clip.image && !clip.text) {
          const resp = await fetch(clip.image);
          const blob = await resp.blob();
          await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
        } else {
          await navigator.clipboard.writeText(clip.text || "");
        }
        markCopied(btn);
      } catch {
        if (clip.text) {
          const ta = document.createElement("textarea");
          ta.value = clip.text;
          ta.style.cssText = "position:fixed;opacity:0";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
          markCopied(btn);
        } else {
          showToast("⚠️ Image copy not supported — right-click to save.");
        }
      }
    }
    function markCopied(btn) {
      btn.classList.add("copied");
      btn.innerHTML = `<span>✓</span><span>Copied!</span>`;
      setTimeout(() => {
        btn.classList.remove("copied");
        btn.innerHTML = `<span>📋</span><span>Copy</span>`;
      }, 2000);
    }

    // ── Lightbox close ───────────────────────────────
    lightbox.addEventListener("click", () => lightbox.classList.remove("open"));

    // ── Helpers ──────────────────────────────────────
    function formatDate(d) {
      const diff = (Date.now() - d) / 1000;
      if (diff < 60) return "Just now";
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    }

    let toastTimer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2800);
    }
  </script>
</body>
</html>
